<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VS Fashions Login</title>
    <link rel="stylesheet" href="/static/css/login.css">
</head>
<body>

<div class="container">

    <div class="left">
        <h1>VS FASHIONS</h1>
        <p>Luxury Fashion Experience</p>
    </div>

    <div class="login-box">
        <h2>Welcome Back</h2>

        {% if messages %}
            {% for message in messages %}
                <div style="
                    background:#ffebee;
                    color:#d32f2f;
                    padding:10px;
                    border-radius:8px;
                    margin-bottom:15px;
                    text-align:center;
                ">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Username">

            <input type="password" name="password" placeholder="Password">

            <button type="submit">LOGIN</button>
        </form>

        <p>New User? <a href="{% url 'register' %}">Create Account</a></p>

    </div>

</div>

</body>
</html>
