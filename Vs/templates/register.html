<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | VS Fashions</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#000);
        }

        .container{
            width:420px;
            background:rgba(255,255,255,0.05);
            backdrop-filter:blur(15px);
            border-radius:25px;
            padding:40px;
            box-shadow:0 0 30px rgba(244,177,95,.25);
        }

        h1{
            text-align:center;
            color:#f4b15f;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:14px;
            margin:10px 0;
            border:none;
            border-radius:10px;
            background:#1f2937;
            color:white;
            font-size:15px;
        }

        button{
            width:100%;
            padding:14px;
            margin-top:15px;
            border:none;
            border-radius:10px;
            background:#f4b15f;
            color:black;
            font-weight:bold;
            cursor:pointer;
        }

        p{
            text-align:center;
            margin-top:20px;
            color:#ccc;
        }

        a{
            color:#f4b15f;
            text-decoration:none;
            font-weight:600;
        }

        .logo{
            text-align:center;
            color:white;
            font-size:28px;
            font-weight:bold;
            margin-bottom:10px;
            letter-spacing:3px;
        }
    </style>

</head>
<body>

<div class="container">

    <div class="logo">VS FASHIONS</div>

    <h1>Create Account</h1>

    {% if messages %}
        {% for message in messages %}
            <div style="
                background:#ffebee;
                color:#d32f2f;
                padding:10px;
                border-radius:8px;
                margin-bottom:15px;
                text-align:center;
            ">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>

        <input type="email" name="email" placeholder="Email Address" required>

        <input type="password" name="password1" placeholder="Password" required>

        <input type="password" name="password2" placeholder="Confirm Password" required>

        <button type="submit">Create Account</button>
    </form>

    <p>
        Already have an account?
        <a href="{% url 'login' %}">Login</a>
    </p>

</div>

</body>
</html>
